    const { useState, useEffect, useRef } = React;

    // sound synthesizer built on Web Audio API
    class SoundManager {
      constructor() {
        this.ctx = null;
        this.enabled = true;
      }

      initCtx() {
        if (!this.ctx && typeof window !== 'undefined') {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (AudioContextClass) {
            this.ctx = new AudioContextClass();
          }
        }
      }

      toggleSound() {
        this.enabled = !this.enabled;
        return this.enabled;
      }

      playWhoosh() {
        if (!this.enabled) return;
        this.initCtx();
        if (!this.ctx) return;
        try {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(400, this.ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(this.ctx.currentTime + 0.15);
        } catch (e) {}
      }

      playThud() {
        if (!this.enabled) return;
        this.initCtx();
        if (!this.ctx) return;
        try {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(150, this.ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(30, this.ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(this.ctx.currentTime + 0.1);
        } catch (e) {}
      }

      playCoin() {
        if (!this.enabled) return;
        this.initCtx();
        if (!this.ctx) return;
        try {
          const osc1 = this.ctx.createOscillator();
          const osc2 = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc1.frequency.setValueAtTime(987.77, this.ctx.currentTime);
          osc1.frequency.setValueAtTime(1318.51, this.ctx.currentTime + 0.08);
          osc2.frequency.setValueAtTime(1174.66, this.ctx.currentTime);
          osc2.frequency.setValueAtTime(1567.98, this.ctx.currentTime + 0.08);
          gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.35);
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(this.ctx.destination);
          osc1.start();
          osc2.start();
          osc1.stop(this.ctx.currentTime + 0.35);
          osc2.stop(this.ctx.currentTime + 0.35);
        } catch (e) {}
      }

      playSpin() {
        if (!this.enabled) return;
        this.initCtx();
        if (!this.ctx) return;
        try {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, this.ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(300, this.ctx.currentTime + 0.04);
          gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.04);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(this.ctx.currentTime + 0.04);
        } catch (e) {}
      }

      playWin() {
        if (!this.enabled) return;
        this.initCtx();
        if (!this.ctx) return;
        try {
          const notes = [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((freq, index) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime + index * 0.08);
            gain.gain.setValueAtTime(0.15, this.ctx.currentTime + index * 0.08);
            gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + index * 0.08 + 0.25);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(this.ctx.currentTime + index * 0.08);
            osc.stop(this.ctx.currentTime + index * 0.08 + 0.25);
          });
        } catch (e) {}
      }

      playLose() {
        if (!this.enabled) return;
        this.initCtx();
        if (!this.ctx) return;
        try {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(300, this.ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.6);
          gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.6);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(this.ctx.currentTime + 0.6);
        } catch (e) {}
      }
    }

    // SpinWheel Component
    function SpinWheel({ onWin, onClose, lastDailySpin }) {
      const [rotation, setRotation] = useState(0);
      const [isSpinning, setIsSpinning] = useState(false);
      const [spinReward, setSpinReward] = useState(null);
      const [hasSpun, setHasSpun] = useState(false);

      const sectors = [
        { value: 100, label: '100 Gold', color: '#1e293b' },
        { value: 500, label: '500 Gold', color: '#fbbf24' },
        { value: 1000, label: '1,000 Gold', color: '#0284c7' },
        { value: 50000, label: 'JACKPOT 🔥', color: '#dc2626' },
        { value: 200, label: '200 Gold', color: '#1e293b' },
        { value: 10000, label: '10K Bounty', color: '#10b981' },
        { value: 500, label: '500 Gold', color: '#ca8a04' },
        { value: 100000, label: 'MEGA JACKPOT', color: '#8b5cf6' },
      ];

      const spin = () => {
        if (isSpinning || hasSpun) return;
        setIsSpinning(true);
        audio.playCoin();

        const wonIdx = Math.floor(Math.random() * sectors.length);
        const sectorDeg = 360 / sectors.length;
        const initialSpins = 360 * 6; // 6 spins
        const sectorOffset = 360 - (wonIdx * sectorDeg) - (sectorDeg / 2);
        const finalAngle = rotation + initialSpins + sectorOffset;

        let currentAngle = rotation;
        const totalRot = finalAngle - rotation;
        const startTime = performance.now();
        const duration = 4000;

        const animate = (now) => {
          const elapsed = now - startTime;
          if (elapsed >= duration) {
            setRotation(finalAngle);
            setIsSpinning(false);
            setHasSpun(true);
            setSpinReward(sectors[wonIdx]);
            audio.playWin();
            onWin(sectors[wonIdx].value);
            return;
          }

          const t = elapsed / duration;
          const ease = 1 - Math.pow(1 - t, 3); // cubic ease-out
          const nextAngle = rotation + totalRot * ease;

          if (Math.floor(nextAngle / sectorDeg) > Math.floor(currentAngle / sectorDeg)) {
            audio.playSpin();
          }

          currentAngle = nextAngle;
          setRotation(nextAngle);
          requestAnimationFrame(animate);
        };

        requestAnimationFrame(animate);
      };

      return (
        <div className="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4">
          <div className="bg-brand-card border border-white/10 p-6 rounded-3xl max-w-sm w-full text-center relative overflow-hidden glow-gold">
            <h2 className="text-2xl font-black text-amber-400 mb-2 tracking-tight">DAILY SPIN WHEEL</h2>
            <p className="text-slate-400 text-xs mb-6 font-medium">Claim your daily fortune! Touch center play button to rotate!</p>

            {/* Wheel Canvas Container */}
            <div className="relative w-72 h-72 mx-auto mb-6 flex items-center justify-center">
              {/* Outer Pointer */}
              <div className="absolute top-0 z-10 w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-t-[20px] border-t-rose-500"></div>
              
              {/* Spinning Plate */}
              <div 
                className="w-full h-full rounded-full border-8 border-slate-800 shadow-2xl relative overflow-hidden transition-transform duration-100 ease-out"
                style={{ 
                  transform: `rotate(${rotation}deg)`,
                  background: 'radial-gradient(circle, #0f172a 20%, #020617 100%)'
                }}
              >
                {sectors.map((sec, idx) => {
                  const deg = 360 / sectors.length;
                  const rot = idx * deg;
                  return (
                    <div 
                      key={idx}
                      className="absolute top-0 right-0 left-0 bottom-0 origin-center text-[10px] font-black pointer-events-none select-none text-white pt-2 text-center"
                      style={{
                        transform: `rotate(${rot}deg)`,
                        clipPath: 'polygon(50% 50%, 30% 0, 70% 0)'
                      }}
                    >
                      <div className="absolute top-4 left-1/2 -translate-x-1/2 flex flex-col items-center gap-1">
                        <span className="text-sm">🪙</span>
                        <span className="font-mono" style={{ textShadow: '0 2px 4px rgba(0,0,0,0.8)' }}>
                          {sec.label}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Spin Button Node Center */}
              <button 
                onClick={spin}
                disabled={isSpinning || hasSpun}
                className={`absolute w-16 h-16 rounded-full font-black text-xs text-slate-950 flex items-center justify-center active:scale-95 transition-transform border-4 border-slate-950 focus:outline-none ${
                  hasSpun 
                    ? 'bg-slate-700 text-slate-300' 
                    : 'bg-amber-400 hover:bg-amber-300 glow-gold cursor-pointer'

              >
                {isSpinning ? '...' : hasSpun ? 'DONE' : 'SPIN'}

            {spinReward && (

            )}

            <button

    // Matchmaking Screen Simulation
    function Matchmaking({ gameId, tier, lobbyCategory, opponent, onStartGame, onCancel }) {
      const [countdown, setCountdown] = useState(3);
      const [step, setStep] = useState('searching'); // 'searching' | 'found' | 'ready'
      const [loadingPct, setLoadingPct] = useState(0);

      useEffect(() => {
        audio.playWhoosh();
        // Step 1: Simulate searching loading bar
        const intervalId = setInterval(() => {
          setLoadingPct((prev) => {
            if (prev >= 100) {
              clearInterval(intervalId);
              setStep('found');
              return 100;
            }
            return prev + Math.floor(Math.random() * 15) + 5;
          });
        }, 150);

        return () => clearInterval(intervalId);
      }, []);

      useEffect(() => {
        if (step !== 'found') return;
        audio.playCoin();
        
        // Count down to start
        const cdInterval = setInterval(() => {
          setCountdown((prev) => {
            if (prev <= 1) {
              clearInterval(cdInterval);
              onStartGame();
              return 0;
            }
            audio.playThud();
            return prev - 1;
          });
        }, 1000);

        return () => clearInterval(cdInterval);
      }, [step]);

      const gameDetails = GAME_CATALOG.find(g => g.id === gameId);

      return (
        <div className="fixed inset-0 bg-slate-950/95 z-40 flex flex-col items-center justify-center p-6 text-center">

            </span>
            <h2 className="text-xl font-bold text-white mt-4">{gameDetails?.title}</h2>
            <p className="text-xs text-slate-400 mt-1 uppercase tracking-wider font-mono">Entry: 🪙{tier.fee} Coins | Reward Pool: 🪙{tier.pool} Coins</p>

            {/* Duelists Visual representation */}
            <div className="flex items-center justify-between mt-8 p-4 bg-black/40 rounded-2xl border border-white/5 relative">
              
              {/* Player */}
              <div className="flex flex-col items-center flex-1">
                <span className="text-5xl mb-2 animate-pulse">🦊</span>
                <span className="text-sm font-black text-white truncate max-w-[120px]">You</span>
                <span className="text-[10px] text-emerald-400 font-mono">LEVEL 4</span>
              </div>

              {/* VS separator */}
              <div className="text-slate-500 font-black text-xl italic px-4">
                {step === 'found' ? (
                  <span className="text-rose-500 text-2xl font-black animate-bounce">VS</span>
                ) : 'Searching'}
              </div>

              {/* Opponent */}
              <div className="flex flex-col items-center flex-1">
                {step === 'found' ? (
                  <>
                    <span className="text-5xl mb-2">🐼</span>
                    <span className="text-sm font-black text-white truncate max-w-[120px]">{opponent.name}</span>
                    <span className="text-[10px] text-amber-400 font-mono">LEVEL 14</span>
                  </>
                ) : (
                  <>
                    <span className="text-5xl mb-2 animate-bounce">❓</span>
                    <span className="text-xs text-slate-500 italic">Matching Rival...</span>
                  </>
                )}
              </div>
            </div>

            {/* Loading Bar or Countdown */}
            <div className="mt-8">
              {step === 'searching' ? (
                <>
                  <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden mb-3">
                    <div className="bg-rose-600 h-full transition-all duration-150 ease-out" style={{ width: `${loadingPct}%` }}></div>
                  </div>
                  <p className="text-xs text-slate-500 italic">Matching with verified players online...</p>
                  <button 
                    onClick={onCancel}
                    className="mt-6 bg-slate-900 hover:bg-slate-800 text-slate-400 font-bold text-xs py-2 px-6 rounded-xl border border-white/5 active:scale-95 transition-transform"
                  >
                    Cancel Matchmaking
                  </button>
                </>
              ) : (
                <div className="space-y-2">
                  <span className="text-5xl font-black text-rose-500 animate-ping block">{countdown}</span>
                  <p className="text-sm font-bold text-green-400">RIVAL DETECTED! Preparing Table...</p>
                </div>
              )}

          </div>
        </div>
      );
    }

    // Card Duel Components
    function CardDuel({ opponentName, opponentAvatar, entryFee, prizePool, onGameOver }) {
      const [cards, setCards] = useState([
        { id: 1, type: 'winner', isFlipped: false, selectedBy: null },
        { id: 2, type: 'loser', isFlipped: false, selectedBy: null },
        { id: 3, type: 'loser', isFlipped: false, selectedBy: null },
      ]);
      const [stage, setStage] = useState('ready'); // 'ready'|'preview'|'shuffling'|'player-pick'|'reveal'|'finished'
      const [status, setStatus] = useState('Welcome! Press Start to memorize the winning card and spin!');
      const [timer, setTimer] = useState(3);
      const [selectedCardId, setSelectedCardId] = useState(null);

      const startDuel = () => {
        audio.playWhoosh();
        setCards(cards.map(c => ({ ...c, isFlipped: true, selectedBy: null })));
        setStage('preview');
        setStatus('MEMORIZE THE CHAMPION (GOLDEN CARD)!');
        setTimer(3);
      };

      useEffect(() => {
        if (stage !== 'preview') return;
        const interval = setInterval(() => {
          setTimer((prev) => {
            if (prev <= 1) {
              clearInterval(interval);
              startShuffling();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [stage]);

      const startShuffling = () => {
        setStage('shuffling');
        setStatus('Shuffling card decks...');
        setCards(cards.map(c => ({ ...c, isFlipped: false })));

        let counter = 0;
        const shuffleInt = setInterval(() => {
          audio.playSpin();
          setCards((prev) => {
            const next = [...prev];
            const i1 = Math.floor(Math.random() * 3);
            let i2 = Math.floor(Math.random() * 3);
            while (i2 === i1) i2 = Math.floor(Math.random() * 3);
            const temp = next[i1];
            next[i1] = next[i2];
            next[i2] = temp;
            return next;
          });
          counter++;
          if (counter >= 6) {
            clearInterval(shuffleInt);
            setStage('player-pick');
            setStatus('YOUR TURN: Select the Golden Card!');
          }
        }, 300);
      };

      const selectCard = (id) => {
        if (stage !== 'player-pick') return;
        audio.playThud();
        setSelectedCardId(id);
        
        let targetOpponentChoice = null;
        setCards((prev) => {
          const updated = prev.map(c => c.id === id ? { ...c, selectedBy: 'player' } : c);
          const remaining = updated.filter(c => c.selectedBy === null);
          const randomIdx = Math.floor(Math.random() * remaining.length);
          if (remaining[randomIdx]) {
            targetOpponentChoice = remaining[randomIdx].id;
          }
          return updated.map(c => c.id === targetOpponentChoice ? { ...c, selectedBy: 'opponent' } : c);
        });

        setStage('reveal');
        setStatus('Cards Locked! Revealing results in 2 seconds...');

        setTimeout(() => {
          setCards(prev => prev.map(c => ({ ...c, isFlipped: true })));
          setStage('finished');
          
          const playerSelectedCard = cards.find(c => c.id === id);
          if (playerSelectedCard.type === 'winner') {
            audio.playWin();
            setStatus('VICTORY! You picked the GOLD CARD correctly!');

            audio.playLose();
            setStatus('DEFEAETED! You selected a dummy loser card.');

        const oppScore = playerWon ? 0 : 1;

      return (
        <div className="max-w-xl mx-auto p-4 bg-brand-card border border-white/5 rounded-3xl glow-brand mt-4 text-center">
          <div className="flex justify-between items-center bg-black/40 p-3 rounded-2xl border border-white/5 mb-6">
            <div className="flex items-center gap-2">
              <span className="text-2xl">🦊</span>

            <div className="text-xs font-black text-rose-500 uppercase font-mono px-3 py-1 bg-rose-500/10 rounded-full">

            <div className="flex items-center gap-2">

          <p className="text-xs text-amber-400 font-bold mb-1 uppercase tracking-widest font-mono">STATUS UPDATES</p>
          <div className="bg-black/30 p-2 rounded-xl text-xs text-white max-w-sm mx-auto mb-6 font-medium">
            {stage === 'preview' ? `${status} (Closing in ${timer}s...)` : status}
          </div>

          {/* Cards Table */}
          <div className="grid grid-cols-3 gap-4 max-w-sm mx-auto min-h-[160px] items-center mb-8">
            {cards.map((card, idx) => {
              return (
                <div 
                  key={card.id}
                  onClick={() => selectCard(card.id)}
                  className={`aspect-[2/3] text-center rounded-2xl relative select-none flex flex-col items-center justify-center border-2 transition-all duration-300 transform active:scale-95 ${
                    stage === 'player-pick' ? 'hover:-translate-y-2 cursor-pointer scale-100 glow-brand hover:border-rose-400' : ''
                  } ${
                    card.isFlipped 
                      ? card.type === 'winner' 
                        ? 'bg-amber-400 text-slate-900 border-amber-300'

    // Ludo Mini component in Standalone HTML
    function Ludo({ opponentName, opponentAvatar, entryFee, prizePool, onGameOver }) {
      const [diceVal, setDiceVal] = useState(6);
      const [rolling, setRolling] = useState(false);
      const [turn, setTurn] = useState('player'); // 'player' | 'opponent'
      const [pWins, setPWins] = useState(0);
      const [oWins, setOWins] = useState(0);
      const [scoreMsg, setScoreMsg] = useState('First to slice or reach HOME with high dice rolls wins the board!');
      const [pCoins, setPCoins] = useState(1);
      const [oCoins, setOCoins] = useState(1);

      const rollDice = () => {
        if (rolling || turn !== 'player') return;
        setRolling(true);
        audio.playSpin();

        let times = 0;
        const int = setInterval(() => {
          setDiceVal(Math.floor(Math.random() * 6) + 1);
          times++;
          if (times >= 8) {
            clearInterval(int);
            setRolling(false);
            const val = Math.floor(Math.random() * 6) + 1;
            setDiceVal(val);
            
            // Advance pawn simulation
            setPCoins(prev => {
              const next = prev + val;
              if (next >= 15) {
                audio.playWin();
                setPWins(p => p + 1);
                setScoreMsg('YOUR PAWN REACHED HOME! Incredible speedrun!');
                return 15;
              }
              audio.playThud();
              setScoreMsg(`Advancing Red pawn by ${val} blocks.`);
              return next;
            });

            // Trigger Opponent pick
            setTurn('opponent');
            setTimeout(() => {
              triggerOpponentRoll();
            }, 1200);
          }
        }, 100);
      };

      const triggerOpponentRoll = () => {
        audio.playSpin();
        const diceValOpp = Math.floor(Math.random() * 6) + 1;
        setDiceVal(diceValOpp);

        setOCoins(prev => {
          const next = prev + diceValOpp;
          if (next >= 15) {
            audio.playLose();
            setOWins(o => o + 1);
            setScoreMsg(`Rival Pawn reached HOME via ${diceValOpp} roll!`);
            return 15;
          }
          audio.playWhoosh();
          setScoreMsg(`Rival ${opponentName} advanced Green pawn by ${diceValOpp} blocks.`);
          return next;
        });

        setTurn('player');
      };

      const userScore = pWins;
      const opponentScore = oWins;
      const gameFinished = pWins >= 2 || oWins >= 2 || pCoins >= 15 || oCoins >= 15;

      const triggerGameOverResult = () => {
        onGameOver(pCoins, oCoins, pCoins >= oCoins);
      };

      return (
        <div className="max-w-xl mx-auto p-4 bg-brand-card border border-white/5 rounded-3xl glow-brand mt-4">
          <div className="flex justify-between items-center bg-black/40 p-3 rounded-2xl border border-white/5 mb-6">
            <span className="font-bold text-xs uppercase font-mono text-emerald-400">🎲 Speed Ludo 1v1</span>
            <span className="text-slate-400 font-medium text-xs">Pawn Path Racer</span>
          </div>

          <div className="bg-black/20 p-3 rounded-xl border border-white/5 mb-6 text-center text-xs text-white">
            {scoreMsg}
          </div>

          {/* Path Race visualization */}
          <div className="bg-black/40 p-4 rounded-xl border border-white/5 space-y-4 mb-6">
            {/* Player red path */}
            <div>
              <div className="flex justify-between text-[11px] mb-1 font-mono text-rose-400">
                <span>🔴 Your Red Pawn: Block {pCoins}/15</span>
                {pCoins >= 15 && <span className="text-green-400 tracking-wider font-extrabold uppercase animate-pulse">HOME!</span>}
              </div>
              <div className="w-full bg-slate-900 border border-slate-700 h-6 rounded-lg relative overflow-hidden flex items-center px-1">
                <div className="bg-rose-600/30 h-full rounded-md transition-all duration-300" style={{ width: `${(pCoins/15)*100}%` }}></div>
                <span className="absolute text-sm font-bold transition-all duration-300" style={{ left: `calc(${Math.min((pCoins/15)*100, 92)}% - 4px)` }}>🔴</span>
              </div>
            </div>

            {/* Opponent green path */}
            <div>
              <div className="flex justify-between text-[11px] mb-1 font-mono text-emerald-400">
                <span>🟢 {opponentName}'s Green Pawn: Block {oCoins}/15</span>
                {oCoins >= 15 && <span className="text-green-400 tracking-wider font-extrabold uppercase animate-pulse">HOME!</span>}
              </div>
              <div className="w-full bg-slate-900 border border-slate-700 h-6 rounded-lg relative overflow-hidden flex items-center px-1">
                <div className="bg-emerald-600/30 h-full rounded-md transition-all duration-300" style={{ width: `${(oCoins/15)*100}%` }}></div>
                <span className="absolute text-sm font-bold transition-all duration-300" style={{ left: `calc(${Math.min((oCoins/15)*100, 92)}% - 4px)` }}>🟢</span>
              </div>
            </div>
          </div>

          {/* Dice Block Selector */}
          <div className="text-center p-4 bg-black/50 border border-white/5 rounded-2xl max-w-sm mx-auto mb-6">
            <span className="text-[10px] uppercase font-mono tracking-widest text-[#94a3b8] block mb-2">
              {turn === 'player' ? 'YOUR ROLL' : `${opponentName.toUpperCase()}'S TURN`}
            </span>
            
            {/* Roll Dice Box */}
            <div 
              onClick={rollDice}
              className={`w-16 h-16 mx-auto rounded-2xl flex items-center justify-center font-black text-2xl border-2 active:scale-90 transition-transform ${
                rolling ? 'animate-spin bg-amber-500 border-amber-300' : 'bg-slate-800 border-slate-600 hover:border-slate-400 cursor-pointer text-white'
              }`}
            >
              {diceVal}
            </div>

            <p className="text-[10px] text-slate-400 mt-2">
              {rolling ? 'Sifting numbers...' : turn === 'player' ? 'Touch local dice block above to roll!' : 'Waiting for rival CPU...'}
            </p>
          </div>

          <div className="text-center">
            {gameFinished ? (
              <button 
                onClick={triggerGameOverResult}
                className="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black px-6 py-2 rounded-xl text-xs active:scale-95 transition-transform cursor-pointer"
              >
                SUBMIT BOARD VERDICT
              </button>
            ) : null}
          </div>
        </div>
      );
    }

    // Speed Rummy Game Simulation
    function SpeedRummy({ opponentName, opponentAvatar, entryFee, prizePool, onGameOver }) {
      const [cards, setCards] = useState([
        { id: 'r1', value: 'A♣️', suit: 'clubs', grouped: false },
        { id: 'r2', value: '2♣️', suit: 'clubs', grouped: false },
        { id: 'r3', value: '3♣️', suit: 'clubs', grouped: false },
        { id: 'r4', value: 'K♦️', suit: 'diamonds', grouped: false },
        { id: 'r5', value: '10♥️', suit: 'hearts', grouped: false }
      ]);
      const [hasDeclared, setHasDeclared] = useState(false);
      const [seqSuccess, setSeqSuccess] = useState(false);
      const [status, setStatus] = useState('Sort the Spade sequence or declare to beat rival sequence!');

      const toggleSortGroup = (id) => {
        audio.playThud();
        setCards(prev => prev.map(c => {
          if (c.id === id) {
            return { ...c, grouped: !c.grouped };
          }
          return c;
        }));
      };

      const handleDrawCard = () => {
        audio.playWhoosh();
        setCards(prev => {
          if (prev.length >= 6) return prev;
          return [...prev, { id: 'r6', value: '4♣️', suit: 'clubs', grouped: false }];
        });
        setStatus('Drew a club card! Try making an Ace-2-3-4 clubs sequence sequence!');
      };

      const handleDeclare = () => {
        audio.playCoin();
        const filteredClubs = cards.filter(c => c.suit === 'clubs');
        
        setHasDeclared(true);
        if (filteredClubs.length >= 4) {
          audio.playWin();
          setSeqSuccess(true);
          setStatus('CONGRATULATIONS SEQUENCE ESTABLISHED! DECLARATION ACCEPTED!');
        } else {
          audio.playLose();
          setSeqSuccess(false);
          setStatus('FAILED DECLARATION! You hold too many loose unconnected cards.');
        }
      };

      return (
        <div className="max-w-xl mx-auto p-4 bg-brand-card border border-white/5 rounded-3xl glow-brand mt-4 text-center">
          <div className="flex justify-between items-center bg-black/40 p-3 rounded-2xl border border-white/5 mb-6">
            <span className="font-bold text-xs uppercase font-mono text-emerald-400">🃏 Speed Rummy Pro</span>
            <span className="text-slate-400 font-medium text-xs">Meld & Declare Sequence</span>
          </div>

          <div className="bg-black/20 p-3 rounded-xl border border-white/5 mb-6 text-center text-xs text-white">
            {status}
          </div>

          {/* Cards Deck Container */}
          <div className="flex gap-2.5 justify-center overflow-x-auto p-4 mb-6">
            {cards.map(c => {
              return (
                <div 
                  key={c.id}
                  onClick={() => toggleSortGroup(c.id)}
                  className={`w-14 h-20 rounded-xl relative select-none flex flex-col items-center justify-center border-2 cursor-pointer transition-all ${
                    c.grouped 
                      ? 'bg-emerald-950 border-emerald-400 -translate-y-2 text-emerald-200' 
                      : 'bg-slate-800 border-slate-700 hover:border-slate-500 text-white'
                  }`}
                >
                  <span className="font-extrabold text-sm">{c.value}</span>
                  <span className="text-[7px] uppercase font-mono mt-1 opacity-50">{c.grouped ? 'MELDED' : 'SORT'}</span>
                </div>
              );
            })}
          </div>

          <div className="flex gap-2 justify-center max-w-sm mx-auto mb-6">
            <button 
              onClick={handleDrawCard}
              disabled={cards.length >= 6 || hasDeclared}
              className="bg-slate-850 hover:bg-slate-800 text-white text-xs font-bold px-4 py-2.5 rounded-xl border border-white/10 flex-1 active:scale-95 transition-transform"
            >
              🃏 Draw a card
            </button>
            <button 
              onClick={handleDeclare}
              disabled={hasDeclared}
              className="bg-emerald-500 hover:bg-emerald-400 text-slate-950 text-xs font-black px-4 py-2.5 rounded-xl flex-1 active:scale-95 transition-transform"
            >
              🔥 Declare Sequence
            </button>
          </div>

          {hasDeclared && (
            <div className="mt-4">
              <button 
                onClick={() => onGameOver(seqSuccess ? 100 : 20, seqSuccess ? 20 : 100, seqSuccess)}
                className="bg-amber-400 hover:bg-amber-300 text-slate-950 font-black text-xs px-6 py-2 rounded-xl transition-all"
              >
                Claim Rummy Verdict
              </button>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // MAIN APP ENTRY COMPONENT

    function App() {
      // General profile stats hydrated with localStorage if present
      const [profile, setProfile] = useState(() => {
        const local = localStorage.getItem('winzo_standalone_profile');
        return local ? JSON.parse(local) : INITIAL_PROFILE;
      });

      const [quests, setQuests] = useState(() => {
        const local = localStorage.getItem('winzo_standalone_quests');
        return local ? JSON.parse(local) : INITIAL_QUESTS;
      });

      const [leaderboard, setLeaderboard] = useState(() => {
        const local = localStorage.getItem('winzo_standalone_leaderboard');
        return local ? JSON.parse(local) : INITIAL_LEADERBOARD;
      });

      const [transactionRequests, setTransactionRequests] = useState(() => {
        const local = localStorage.getItem('winzo_standalone_transactions');
        return local ? JSON.parse(local) : [];
      });

      const [soundEnabled, setSoundEnabled] = useState(true);
      const [currentView, setCurrentView] = useState('lobby'); // 'lobby' | 'matchmaking' | 'playing' | 'spin-wheel' | 'selecting-tier'
      
      const [activeGameId, setActiveGameId] = useState(null);
      const [selectedTier, setSelectedTier] = useState(null);
      const [activeMatchOpponent, setActiveMatchOpponent] = useState(null);

      // Deposit / Withdraw variables
      const [isDepositOpen, setIsDepositOpen] = useState(false);
      const [isWithdrawOpen, setIsWithdrawOpen] = useState(false);
      const [depositAmt, setDepositAmt] = useState(100);
      const [withdrawAmt, setWithdrawAmt] = useState(50);
      const [withdrawAddress, setWithdrawAddress] = useState('');
      const [withdrawPlatform, setWithdrawPlatform] = useState('upi');

      // Update LocalStorage whenever states alter
      useEffect(() => {
        localStorage.setItem('winzo_standalone_profile', JSON.stringify(profile));
      }, [profile]);

      useEffect(() => {
        localStorage.setItem('winzo_standalone_quests', JSON.stringify(quests));
      }, [quests]);

      useEffect(() => {
        localStorage.setItem('winzo_standalone_leaderboard', JSON.stringify(leaderboard));
      }, [leaderboard]);

      useEffect(() => {
        localStorage.setItem('winzo_standalone_transactions', JSON.stringify(transactionRequests));
      }, [transactionRequests]);

      const toggleSound = () => {
        const next = audio.toggleSound();
        setSoundEnabled(next);
      };

      const selectGame = (gameId) => {
        audio.playThud();
        setActiveGameId(gameId);
        
        if (gameId === 'spin-wheel') {
          setCurrentView('spin-wheel');
        } else {
          setCurrentView('selecting-tier');
        }
      };

      const selectTier = (tier) => {
        audio.playCoin();
        setSelectedTier(tier);

        // Deduct entry fee
        if (profile.coins < tier.fee) {
          alert('Insufficient coins! Open Deposit Panel from top right header to get coins.');
          return;
        }

        // Subtract cost from account
        setProfile(prev => ({
          ...prev,
          coins: prev.coins - tier.fee,
          matchesPlayed: prev.matchesPlayed + 1
        }));

        // Pick opponent avatar
        const opponents = [
          { name: 'Aditya Sen', avatar: '🐱' },
          { name: 'Rohit Kumar', avatar: '🦁' },
          { name: 'Priyah Patel', avatar: '🐨' },
          { name: 'Megha Singh', avatar: '🐼' },
          { name: 'Kabir Malik', avatar: '🐯' },
        ];
        const randomOpp = opponents[Math.floor(Math.random() * opponents.length)];
        setActiveMatchOpponent(randomOpp);

        setCurrentView('matchmaking');
      };

      const handleGameFinished = (userScore, opponentScore, win) => {
        audio.playCoin();
        
        let rewardAmount = 0;
        if (win && selectedTier) {
          rewardAmount = selectedTier.pool;
        }

        setProfile(prev => {
          const updatedCoins = prev.coins + rewardAmount;
          const updatedWins = win ? prev.wins + 1 : prev.wins;
          const updatedLosses = win ? prev.losses : prev.losses + 1;
          const updatedXp = prev.xp + 25;
          const updatedLevel = Math.floor(updatedXp / 100) + 1;

          // Push into history logs
          const historyRow = {
            id: 'h_' + Date.now(),
            gameId: activeGameId,
            opponentName: activeMatchOpponent.name,
            opponentAvatar: activeMatchOpponent.avatar,
            win: win,
            coinsEarned: win ? selectedTier.pool - selectedTier.fee : -selectedTier.fee,
            entryFee: selectedTier.fee,
            timestamp: new Date().toISOString()
          };

          return {
            ...prev,
            coins: updatedCoins,
            wins: updatedWins,
            losses: updatedLosses,
            xp: updatedXp,
            level: updatedLevel,
            matchHistory: [historyRow, ...prev.matchHistory]
          };
        });

        // Update Quest progression
        setQuests(prevQuests => 
          prevQuests.map(q => {
            if (activeGameId === 'card-duel' && q.id === 'q1') {
              const currentProgress = Math.min(q.progress + 1, q.target);
              return { ...q, progress: currentProgress, completed: currentProgress >= q.target };
            }
            if (activeGameId === 'ludo' && q.id === 'q2' && win) {
              const currentProgress = Math.min(q.progress + 1, q.target);
              return { ...q, progress: currentProgress, completed: currentProgress >= q.target };
            }
            if (activeGameId === 'rummy' && q.id === 'q3' && win) {
              const currentProgress = Math.min(q.progress + 1, q.target);
              return { ...q, progress: currentProgress, completed: currentProgress >= q.target };
            }
            return q;
          })
        );

        setCurrentView('lobby');
      };

      // Daily quests rewards claim trigger
      const claimQuestReward = (id, prizeVal) => {
        audio.playWin();
        setProfile(prev => ({
          ...prev,
          coins: prev.coins + prizeVal
        }));
        setQuests(prev => prev.map(q => q.id === id ? { ...q, claimed: true } : q));
      };

      // Spin Wheel winnings claimer
      const handleSpinWheelWin = (coinsWon) => {
        setProfile(prev => ({
          ...prev,
          coins: prev.coins + coinsWon
        }));
      };

      // Deposits Trigger logic
      const processDeposit = () => {
        audio.playWin();
        setProfile(prev => ({
          ...prev,
          coins: prev.coins + Number(depositAmt)
        }));
        setIsDepositOpen(false);
      };

      // Withdraw Trigger simulation
      const submitWithdrawRequest = () => {
        if (withdrawAmt > profile.coins) {
          alert('Incorrect amount! Over-limit of current coins.');
          return;
        }

        audio.playThud();
        // Create transactional row logged into memory trail
        const txnId = 'TXN_' + Math.floor(Math.random() * 1000000);
        const request = {
          id: txnId,
          type: 'withdraw',
          amount: Number(withdrawAmt),
          status: 'pending',
          timestamp: new Date().toISOString(),
          username: profile.name,
          email: 'sarveshkadam267@gmail.com',
          destination: withdrawAddress || '@upi'
        };

        // Take from player state first
        setProfile(prev => ({
          ...prev,
          coins: prev.coins - Number(withdrawAmt)
        }));

        setTransactionRequests(prev => [request, ...prev]);
        setIsWithdrawOpen(false);
      };

      // Administrative Control Panel handlers
      const approveTrans = (id) => {
        audio.playCoin();
        setTransactionRequests(prev => prev.map(r => r.id === id ? { ...r, status: 'approved' } : r));
      };

      const rejectTrans = (id) => {
        audio.playThud();
        
        // Find transaction request details
        const req = transactionRequests.find(r => r.id === id);
        if (req && req.status === 'pending') {
          // REFUND to player balance
          setProfile(prev => ({
            ...prev,
            coins: prev.coins + req.amount
          }));
        }

        setTransactionRequests(prev => prev.map(r => r.id === id ? { ...r, status: 'rejected' } : r));
      };

      // NEW "CUT" ACTION - voids request without any refund
      const cutTrans = (id) => {
        audio.playThud();
        setTransactionRequests(prev => prev.map(r => r.id === id ? { ...r, status: 'cut' } : r));
      };

      // Infinite Coins Hacks Panel Toggle
      const maxInfiniteCoinsHacks = () => {
        audio.playWin();
        setProfile(prev => ({
          ...prev,

                    className="bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs py-2.5 px-4 rounded-xl flex-1 cursor-pointer"
                  >
                    Cancel
                  </button>
                  <button 
                    onClick={submitWithdrawRequest}
                    className="bg-rose-500 hover:bg-rose-400 text-white font-black text-xs py-2.5 px-4 rounded-xl flex-1 cursor-pointer shadow-lg glow-brand"
                  >
                    Create request
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer Area */}
          <footer className="bg-slate-950 py-6 border-t border-white/5 text-center text-xs text-slate-500">
            <p className="uppercase tracking-widest font-mono font-bold text-[10px] text-slate-400">WINZO ARCADE STANDALONE</p>
            <p className="mt-1">© 2026 WinZO Sandbox. Proudly crafted for Sarvesh Kadam.</p>
          </footer>

        </div>
      );
    }

    // Render the React application inside mounting root
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
